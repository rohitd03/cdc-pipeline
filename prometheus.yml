global:
  scrape_interval: 15s
  evaluation_interval: 15s

# ─────────────────────────────────────────────
# Alertmanager integration
# ─────────────────────────────────────────────
alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - alertmanager:9093

# ─────────────────────────────────────────────
# Alert rule files
# ─────────────────────────────────────────────
rule_files:
  - /etc/prometheus/alerts.yml

scrape_configs:
  - job_name: 'cdc-pipeline'
    static_configs:
      - targets: ['app:8080']
    metrics_path: '/metrics'
