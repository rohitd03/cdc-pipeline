global:
  resolve_timeout: 5m

# Custom notification templates
templates:
  - '/etc/alertmanager/templates/*.tmpl'

# ─────────────────────────────────────────────
# Routing tree
# ─────────────────────────────────────────────
route:
  group_by: ['alertname', 'job']
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h
  receiver: 'slack-warnings'   # default receiver for unmatched alerts

  routes:
    - match:
        severity: critical
      receiver: slack-critical
    - match:
        severity: warning
      receiver: slack-warnings

# ─────────────────────────────────────────────
# Inhibition rules
# Suppress all other alerts from the same job when ServiceDown is firing.
# ─────────────────────────────────────────────
inhibit_rules:
  - source_match:
      alertname: 'ServiceDown'
    target_match_re:
      alertname: '.+'
    equal: ['job']

# ─────────────────────────────────────────────
# Receivers
# Webhook URLs are injected from environment variables at startup.
# ─────────────────────────────────────────────
receivers:
  - name: 'slack-critical'
    slack_configs:
      - api_url: '${SLACK_WEBHOOK_URL_CRITICAL}'
        channel: '#alerts-critical'
        title: '{{ template "slack.title" . }}'
        text: '{{ template "slack.message" . }}'
        send_resolved: true

  - name: 'slack-warnings'
    slack_configs:
      - api_url: '${SLACK_WEBHOOK_URL_WARNINGS}'
        channel: '#alerts-warnings'
        title: '{{ template "slack.title" . }}'
        text: '{{ template "slack.message" . }}'
        send_resolved: true
